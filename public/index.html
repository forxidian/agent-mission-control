<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#181713">
    <meta name="application-name" content="Agent Mission Control">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Agent 控制台">
    <title>Agent 任务控制台</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-view="dashboard">
    <main class="shell">
      <div class="pwa-window-control-stack" aria-label="窗口控制">
        <button id="app-hide-button" class="action-button secondary pwa-window-button pwa-floating-button pwa-hide-button" type="button" hidden title="隐藏面板">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
            <path d="M9.2 5.4A9.8 9.8 0 0 1 12 5c5 0 8.4 4.1 9.5 7a12 12 0 0 1-2 3.1"></path>
            <path d="M6.5 6.7A12 12 0 0 0 2.5 12c1.1 2.9 4.5 7 9.5 7a9.9 9.9 0 0 0 4.3-1"></path>
          </svg>
          <span>隐藏</span>
        </button>
        <button id="close-search-page" class="action-button secondary pwa-window-button pwa-floating-button search-return-button" type="button" title="返回看板">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
          <span>返回看板</span>
        </button>
      </div>
      <header class="topbar">
        <div>
          <p class="eyebrow">本地多 Agent 控制台</p>
          <h1>Agent 任务控制台</h1>
        </div>
        <div class="topbar-actions">
          <div id="topbar-metrics" class="topbar-metrics" aria-label="关键指标"></div>
          <button id="open-search-page" class="search-launcher topbar-search-launcher" type="button" aria-label="打开历史线程搜索">
            <span class="search-launcher-label">搜索历史</span>
            <span class="search-launcher-placeholder">搜索线程、项目、路径、最近信号</span>
            <span class="search-launcher-action">打开搜索</span>
          </button>
          <p id="last-updated" class="timestamp" aria-live="polite">等待数据</p>
          <p id="monitor-status" class="timestamp" aria-live="polite" tabindex="0">
            <span class="monitor-status-label">监控未启动</span>
            <span id="monitor-status-tooltip" class="monitor-tooltip" role="tooltip" aria-hidden="true"></span>
          </p>
          <button id="app-install-button" class="action-button secondary pwa-install-button" type="button" hidden title="安装为应用">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 19h14"></path>
            </svg>
            <span>安装应用</span>
          </button>
          <div class="refresh-controls" aria-label="刷新控制">
            <button id="refresh-button" class="icon-button refresh-now-button" type="button" aria-label="刷新看板" title="刷新看板">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 6v5h-5"></path>
                <path d="M4 18v-5h5"></path>
                <path d="M18.5 9A7 7 0 0 0 6.8 6.4L4 9"></path>
                <path d="M5.5 15A7 7 0 0 0 17.2 17.6L20 15"></path>
              </svg>
            </button>
            <label class="toggle auto-refresh-control" title="自动刷新">
              <input id="auto-refresh" type="checkbox" checked aria-label="自动刷新">
              <span class="switch-track" aria-hidden="true"></span>
              <span>自动</span>
            </label>
            <label class="refresh-rate" title="刷新频率">
              <span>每</span>
              <select id="refresh-interval" aria-label="刷新频率">
                <option value="30000" selected>30 秒</option>
                <option value="10000">10 秒</option>
                <option value="60000">60 秒</option>
              </select>
            </label>
          </div>
        </div>
      </header>

      <section id="status-banner" class="status-banner" hidden></section>
      <div id="status-toast" class="status-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

      <section class="prompt-pack-stage dashboard-view" aria-labelledby="prompt-pack-heading">
        <section id="prompt-pack-panel" class="prompt-pack-panel" aria-labelledby="prompt-pack-heading">
          <div class="prompt-pack-top">
            <div class="panel-heading prompt-pack-heading">
              <div>
                <p class="eyebrow">编排</p>
                <h2 id="prompt-pack-heading">Prompt 打包</h2>
              </div>
              <div class="panel-heading-actions prompt-pack-actions">
                <p id="prompt-pack-count" class="panel-note">1 段</p>
                <button id="prompt-pack-add-segment" class="prompt-pack-toolbar-add" type="button" aria-label="在末尾新增段落" title="在末尾新增段落">
                  <span aria-hidden="true" class="prompt-pack-toolbar-add-icon">+</span>
                  <span>新增段落</span>
                </button>
                <button id="prompt-pack-copy" class="action-button primary" type="button">复制 Markdown 包</button>
                <button id="prompt-pack-clear" class="action-button secondary" type="button">清空</button>
              </div>
            </div>
          </div>
          <div id="prompt-pack-segments" class="prompt-pack-segments" aria-live="polite"></div>
        </section>
      </section>

      <section class="panel priority-inbox-panel dashboard-view" aria-labelledby="inbox-heading">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">通知</p>
            <h2 id="inbox-heading">待处理</h2>
          </div>
          <div class="panel-heading-actions">
            <p id="notification-count" class="panel-note">0 项</p>
            <button id="notification-toggle" class="action-button secondary inbox-toggle" type="button" hidden>查看全部</button>
          </div>
        </div>
        <div id="inbox" class="inbox-list priority-inbox-list"></div>
      </section>

      <section id="summary" class="summary-grid dashboard-view" aria-label="看板摘要"></section>

      <section id="search-page" class="search-page" aria-labelledby="search-heading" hidden>
        <div class="search-page-top">
          <div>
            <p class="eyebrow">历史检索</p>
            <h2 id="search-heading">搜索线程</h2>
          </div>
        </div>
        <section class="panel search-panel" aria-label="历史线程搜索">
          <div class="panel-heading search-panel-heading">
            <div>
              <p class="eyebrow">Search</p>
              <h2>全量历史</h2>
            </div>
            <p id="search-count" class="panel-note">输入关键词</p>
          </div>
          <section class="controls search-controls" aria-label="历史线程筛选">
            <label class="search-field">
              <span>搜索</span>
              <input id="search-input" type="search" autocomplete="off" placeholder="搜索历史线程、项目、路径、最近信号">
            </label>
            <label>
              <span>来源</span>
              <select id="provider-filter">
                <option value="all">全部来源</option>
              </select>
            </label>
            <label>
              <span>状态</span>
              <select id="status-filter">
                <option value="all">全部</option>
                <option value="running">工作中</option>
                <option value="fresh">活跃</option>
                <option value="warm">温热</option>
                <option value="idle">空闲</option>
                <option value="archived">已归档</option>
              </select>
            </label>
            <label>
              <span>项目</span>
              <select id="project-filter">
                <option value="all">全部项目</option>
              </select>
            </label>
            <label class="toggle">
              <input id="archive-toggle" type="checkbox">
              <span>显示归档</span>
            </label>
            <label class="toggle">
              <input id="subagent-toggle" type="checkbox">
              <span>显示 Sub Agent</span>
            </label>
            <label class="toggle">
              <input id="automation-toggle" type="checkbox">
              <span>显示自动化</span>
            </label>
          </section>
          <div id="search-results" class="search-result-list" aria-live="polite"></div>
          <div id="search-load-sentinel" class="search-load-sentinel" aria-live="polite"></div>
        </section>
      </section>

      <section id="search-detail-modal" class="search-detail-modal" role="dialog" aria-modal="true" aria-labelledby="search-detail-title" hidden>
        <button class="search-detail-scrim" type="button" data-close-search-detail aria-label="关闭任务详情"></button>
        <article class="search-detail-sheet">
          <div class="search-detail-bar">
            <div>
              <p class="eyebrow">任务详情</p>
              <h2 id="search-detail-title">线程详情</h2>
            </div>
            <button id="close-search-detail" class="action-button secondary" type="button" data-close-search-detail>关闭</button>
          </div>
          <div id="search-detail-content" class="search-detail-content"></div>
        </article>
      </section>

      <section id="image-preview-modal" class="image-preview-modal" role="dialog" aria-modal="true" aria-labelledby="image-preview-title" hidden>
        <button class="image-preview-scrim" type="button" data-close-image-preview aria-label="关闭原图预览"></button>
        <article class="image-preview-sheet">
          <div class="image-preview-bar">
            <div>
              <p class="eyebrow">图片预览</p>
              <h2 id="image-preview-title">原图</h2>
            </div>
            <button class="action-button secondary" type="button" data-close-image-preview>关闭</button>
          </div>
          <div class="image-preview-stage">
            <img id="image-preview-image" class="image-preview-image" alt="">
          </div>
        </article>
      </section>

      <section id="artifact-timeline-modal" class="artifact-timeline-modal" role="dialog" aria-modal="true" aria-labelledby="artifact-timeline-title" hidden>
        <button class="artifact-modal-scrim" type="button" data-close-artifact-timeline aria-label="关闭素材时间轴"></button>
        <article class="artifact-timeline-sheet">
          <div class="artifact-modal-bar">
            <div>
              <p class="eyebrow">素材时间轴</p>
              <h2 id="artifact-timeline-title">线程素材</h2>
            </div>
            <button class="action-button secondary" type="button" data-close-artifact-timeline>关闭</button>
          </div>
          <div id="artifact-timeline-content" class="artifact-timeline-content"></div>
        </article>
      </section>

      <section id="artifact-detail-modal" class="artifact-detail-modal" role="dialog" aria-modal="true" aria-labelledby="artifact-detail-title" hidden>
        <button class="artifact-modal-scrim" type="button" data-close-artifact-detail aria-label="关闭素材详情"></button>
        <article class="artifact-detail-sheet">
          <div class="artifact-modal-bar">
            <div>
              <p class="eyebrow">素材详情</p>
              <h2 id="artifact-detail-title">素材</h2>
            </div>
            <button class="action-button secondary" type="button" data-close-artifact-detail>关闭</button>
          </div>
          <div id="artifact-detail-content" class="artifact-detail-content"></div>
        </article>
      </section>

      <div class="layout dashboard-view">
        <section class="panel thread-panel" aria-labelledby="threads-heading">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">工作</p>
              <h2 id="threads-heading">最近线程</h2>
            </div>
            <div class="panel-heading-actions">
              <p id="thread-count" class="panel-note">0 项</p>
            </div>
          </div>
          <div id="threads" class="thread-list" aria-live="polite"></div>
        </section>

        <section class="panel project-history-panel" aria-labelledby="projects-heading">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">用量</p>
              <h2 id="projects-heading">项目历史</h2>
            </div>
          </div>
          <div id="projects" class="project-list"></div>
        </section>
      </div>

      <section id="detail" class="detail-panel" aria-live="polite"></section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
