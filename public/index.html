<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#181713">
    <meta name="application-name" content="Agent Mission Control">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Agent 控制台">
    <title>Agent 任务控制台</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地多 Agent 控制台</p>
          <h1>Agent 任务控制台</h1>
        </div>
        <div class="topbar-actions">
          <div id="topbar-metrics" class="topbar-metrics" aria-label="关键指标"></div>
          <p id="last-updated" class="timestamp" aria-live="polite">等待数据</p>
          <p id="monitor-status" class="timestamp" aria-live="polite" tabindex="0">
            <span class="monitor-status-label">监控未启动</span>
            <span id="monitor-status-tooltip" class="monitor-tooltip" role="tooltip" aria-hidden="true"></span>
          </p>
          <button id="app-minimize-button" class="action-button secondary pwa-window-button pwa-minimize-button" type="button" hidden title="收起到 Dock">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 12h14"></path>
            </svg>
            <span>收起</span>
          </button>
          <button id="app-install-button" class="action-button secondary pwa-install-button" type="button" hidden title="安装为应用">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 19h14"></path>
            </svg>
            <span>安装应用</span>
          </button>
          <div class="refresh-controls" aria-label="刷新控制">
            <button id="refresh-button" class="icon-button refresh-now-button" type="button" aria-label="刷新看板" title="刷新看板">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 6v5h-5"></path>
                <path d="M4 18v-5h5"></path>
                <path d="M18.5 9A7 7 0 0 0 6.8 6.4L4 9"></path>
                <path d="M5.5 15A7 7 0 0 0 17.2 17.6L20 15"></path>
              </svg>
            </button>
            <label class="toggle auto-refresh-control" title="自动刷新">
              <input id="auto-refresh" type="checkbox" checked aria-label="自动刷新">
              <span class="switch-track" aria-hidden="true"></span>
              <span>自动</span>
            </label>
            <label class="refresh-rate" title="刷新频率">
              <span>每</span>
              <select id="refresh-interval" aria-label="刷新频率">
                <option value="30000" selected>30 秒</option>
                <option value="10000">10 秒</option>
                <option value="60000">60 秒</option>
              </select>
            </label>
          </div>
        </div>
      </header>

      <section id="status-banner" class="status-banner" hidden></section>
      <div id="status-toast" class="status-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

      <section class="panel priority-inbox-panel" aria-labelledby="inbox-heading">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">通知</p>
            <h2 id="inbox-heading">待处理</h2>
          </div>
          <div class="panel-heading-actions">
            <p id="notification-count" class="panel-note">0 项</p>
            <button id="notification-toggle" class="action-button secondary inbox-toggle" type="button" hidden>查看全部</button>
          </div>
        </div>
        <div id="inbox" class="inbox-list priority-inbox-list"></div>
      </section>

      <section id="summary" class="summary-grid" aria-label="看板摘要"></section>

      <div class="layout">
        <section class="panel thread-panel" aria-labelledby="threads-heading">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">工作</p>
              <h2 id="threads-heading">近期工作</h2>
            </div>
            <p id="thread-count" class="panel-note">0 项</p>
          </div>
          <section class="controls" aria-label="任务筛选">
            <label class="search-field">
              <span>搜索</span>
              <input id="search-input" type="search" autocomplete="off" placeholder="任务、项目、来源、路径">
            </label>
            <label>
              <span>来源</span>
              <select id="provider-filter">
                <option value="all">全部来源</option>
              </select>
            </label>
            <label>
              <span>状态</span>
              <select id="status-filter">
                <option value="all">全部</option>
                <option value="running">工作中</option>
                <option value="fresh">活跃</option>
                <option value="warm">温热</option>
                <option value="idle">空闲</option>
                <option value="archived">已归档</option>
              </select>
            </label>
            <label>
              <span>项目</span>
              <select id="project-filter">
                <option value="all">全部项目</option>
              </select>
            </label>
            <label class="toggle">
              <input id="archive-toggle" type="checkbox">
              <span>显示归档</span>
            </label>
          </section>
          <div id="threads" class="thread-list" aria-live="polite"></div>
        </section>

        <aside class="side-rail">
          <section class="panel" aria-labelledby="projects-heading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">用量</p>
                <h2 id="projects-heading">项目排行</h2>
              </div>
            </div>
            <div id="projects" class="project-list"></div>
          </section>
        </aside>
      </div>

      <section id="detail" class="detail-panel" aria-live="polite"></section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
